<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พี่ก็คิดถึงเหมือนกัน</title>
  <style>
    :root {
      --bg1: #ffd6e7;
      --bg2: #ffc3db;
      --card: #fff7fb;
      --text: #5a2a3a;
      --accent: #ff4d88;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tahoma", "Noto Sans Thai", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 16px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: 36px 22px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(90, 42, 58, 0.2);
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.7rem);
      margin-bottom: 12px;
      color: var(--accent);
    }

    p {
      font-size: clamp(1rem, 3vw, 1.2rem);
      margin-bottom: 24px;
      opacity: 0.9;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    a:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>พี่ก็คิดถึงเหมือนกัน ❤️</h1>
    <p>คิดถึงที่สุดเลยนะคนเก่ง</p>
    <a href="index.html">กลับไปตอบอีกครั้ง</a>
  </main>
</body>
</html>
